version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gocritic:
      enabled-tags:
        - diagnostic
        - style
  exclusions:
    paths:
      - api/v1alpha1  # generated code
      - pkg/client    # generated code

formatters:
  enable:
    - gofmt
